version: '3.8'

services:
  hypercortex-ai:
    build: .
    ports:
      - "12000:12000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPIK_API_KEY=${OPIK_API_KEY}
      - REDIS_URL=redis://redis:6379/0
      - DEBUG=False
      - HOST=0.0.0.0
      - PORT=12000
    depends_on:
      - redis
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    networks:
      - hypercortex-network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - hypercortex-network
    command: redis-server --appendonly yes

  # Optional: Redis Commander for Redis management
  redis-commander:
    image: rediscommander/redis-commander:latest
    environment:
      - REDIS_HOSTS=local:redis:6379
    ports:
      - "8081:8081"
    depends_on:
      - redis
    networks:
      - hypercortex-network
    profiles:
      - tools

volumes:
  redis_data:

networks:
  hypercortex-network:
    driver: bridge